<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Author Add Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="mb-4 text-center" th:text="${author != null} ? 'Edit Author' : 'Add New Author'"></h2>

        <!-- Ако book постои → уредување, иначе → додавање -->
        <form th:action="@{/author/edit}" method="post">
            <input type="hidden" name="id" th:value="${author.id}" />

            <label>Name:</label>
            <input type="text" name="name" th:value="${author.name}"/><br/>

            <label>Surname:</label>
            <input type="text" name="surname" th:value="${author.surname}"/><br/>

            <label>Country:</label>
            <input type="text" name="country" th:value="${author.country}"/><br/>


            <label>Biography:</label>
            <input type="text" name="biography" th:value="${author.biography}"/><br/>

            <button type="submit">Save changes</button>
        </form>


        <div class="mt-3 text-center">
            <a href="/authors" class="btn btn-secondary">Back to Authors</a>
        </div>
    </div>
</div>

</body>
</html>
