<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Form</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="mb-4 text-center" th:text="${book != null} ? 'Edit Book' : 'Add New Book'"></h2>

        <!-- Ако book постои → уредување, иначе → додавање -->
        <form th:action="@{/books/edit}" method="post">
            <input type="hidden" name="id" th:value="${book.id}" />

            <label>Title:</label>
            <input type="text" name="title" th:value="${book.title}"/><br/>

            <label>Genre:</label>
            <input type="text" name="genre" th:value="${book.genre}"/><br/>

            <label>Rating:</label>
            <input type="number" step="0.1" name="rating" th:value="${book.averageRating}"/><br/>

            <button type="submit">Save changes</button>
        </form>


        <div class="mt-3 text-center">
            <a href="/books" class="btn btn-secondary">Back to Books</a>
        </div>

    </div>
</div>

</body>
</html>
